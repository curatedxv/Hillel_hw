<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorful Moving Text</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a2e;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .moving-text {
      font-size: 2.5rem;
      font-weight: bold;
      background: linear-gradient(45deg, #f35626, #feab3a, #00c6ff, #0072ff, #ff7b00, #ff3cac);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: colorShift 5s ease infinite, float 3s ease-in-out infinite alternate;
    }

    @keyframes colorShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes float {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }
  </style>
</head>
<body>
  <div class="moving-text">Don't complain, piece of bullshit</div>
</body>
</html>
